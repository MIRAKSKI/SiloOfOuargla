<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body>
    <textarea name="name" id="inparea" rows="8" cols="80"></textarea>
    <input type="button" onclick="startAdding()" name="" value="AddToMain">
  </body>
  <script src="dataTest.js" charset="utf-8"></script>
  <script type="text/javascript">
    function startAdding() {
      let inp = document.getElementById("inparea").value;
      let seg = inp.split("\n");
      let longtxt = "{";
      for (var i = 0; i < seg.length; i++) {
        if (seg[i] != "") {
          let refind = seg[i].replaceAll("' :'", "':'");
          refind = refind.replaceAll("': '", "':'");
          refind = refind.replaceAll("':':'", "':''");
          refind = refind.replaceAll("'", "\"");
          longtxt += refind
          if (i != (seg.length)-2) {
            longtxt += ",";
          }
        }
      }
      longtxt += "}";
      let hourObj = JSON.parse(longtxt);
      let newKey = Object.keys(hourObj);
      for (var i = 0; i < newKey.length; i++) {
        let subKey = Object.keys(hourObj[newKey[i]]);
        for (var o = 0; o < subKey.length; o++) {
          testerOfData["SiloOfOuargla"]["piles"][newKey[i]][subKey[o]] = hourObj[newKey[i]][subKey[o]].replaceAll(" ", "");
        }
      }
      let gh = ["DED","RSD","RED","CSD","CED"];
      let pilesKey = Object.keys(testerOfData["SiloOfOuargla"]["piles"])
      for (var u = 0; u < pilesKey.length; u++) {
        for (var i = 0; i < gh.length; i++) {
          testerOfData["SiloOfOuargla"]["piles"][pilesKey[u]][gh[i]] = testerOfData["SiloOfOuargla"]["piles"][pilesKey[u]]["DSD"];
        }
      }
      console.log(testerOfData);
      document.getElementById('inparea').value = "DONE! check the console";
    }
  </script>
</html>
